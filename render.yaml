# Render Blueprint for the FastAPI backend (Starter web service — always on).
# Deploy: push to GitHub, then in Render: New > Blueprint > pick this repo.
# Secrets marked `sync: false` are entered in the Render dashboard after creation.
services:
  - type: web
    name: worldcup-predictor-api
    runtime: python
    plan: starter
    branch: main
    buildCommand: pip install -r backend/backend/requirements-backend.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: ENVIRONMENT
        value: production
      # Starter plan stays always-on, so the in-process scheduler can run directly.
      # GitHub Actions cron is no longer needed to keep the service warm.
      - key: SCHEDULER_ENABLED
        value: "true"
      # Auto-generated strong secrets:
      - key: SECRET_KEY
        generateValue: true
      - key: TASK_TOKEN
        generateValue: true
      # Set these in the Render dashboard (Environment tab):
      - key: DATABASE_URL          # Neon: postgresql+psycopg://USER:PASS@HOST/DB?sslmode=require
        sync: false
      - key: APP_BASE_URL          # your Streamlit app URL, e.g. https://your-app.streamlit.app
        sync: false
      - key: EMAIL_WHITELIST       # e.g. @yourcompany.com
        sync: false
      - key: ADMIN_EMAILS          # your email, to grant admin
        sync: false
      - key: GEMINI_API_KEY        # optional; enables the AI Match Centre
        sync: false
      - key: ODDS_API_KEY          # optional; enables market odds display (the-odds-api.com)
        sync: false
